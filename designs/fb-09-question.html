<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>FB 09 — Engagement Question</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:#0B3D2E;color:#fff;position:relative;display:flex;flex-direction:column;justify-content:center;padding:120px 100px}
  body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.06) 1.5px,transparent 1.5px);background-size:32px 32px;pointer-events:none}
  body::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(212,168,67,0.15) 0%,transparent 55%);pointer-events:none}
  .qmark{position:absolute;top:90px;right:90px;font-size:220px;line-height:1;color:rgba(212,168,67,0.2);font-weight:900;z-index:1}
  .k{position:relative;z-index:2;font-size:17px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#D4A843;margin-bottom:40px}
  h1{position:relative;z-index:2;font-size:88px;font-weight:900;line-height:1.02;letter-spacing:-2.5px;margin-bottom:40px}
  h1 .a{color:#D4A843}
  .answer{position:relative;z-index:2;display:inline-block;padding:18px 34px;background:rgba(212,168,67,0.15);border:2px solid #D4A843;border-radius:100px;font-size:30px;font-weight:800;color:#F4D98C;letter-spacing:-0.3px;margin-bottom:50px}
  .p{position:relative;z-index:2;font-size:28px;font-weight:600;line-height:1.4;max-width:820px;color:rgba(255,255,255,0.85);margin-bottom:40px;letter-spacing:-0.5px}
  .tag{position:relative;z-index:2;font-size:22px;font-weight:700;color:#D4A843;margin-bottom:60px;letter-spacing:0.3px}
  .tag::before{content:'👇';margin-right:10px;filter:grayscale(0.2)}
  .brand{position:relative;z-index:2;display:flex;align-items:center;gap:14px}
  .brand img{height:40px;background:#fff;padding:7px 12px;border-radius:7px}
  .brand .url{font-size:17px;font-weight:700;color:#D4A843;letter-spacing:0.8px}
</style>
</head>
<body>
  <div class="qmark">?</div>
  <div class="k">Real Talk</div>
  <h1>Would you buy a house<br>without <span class="a">looking inside?</span></h1>
  <div class="answer">Obviously not.</div>
  <div class="p">So why do so many Namibians buy a used car without a proper inspection — and then spend months fixing problems they could have avoided?</div>
  <div class="tag">Tag someone who's about to buy a car.</div>
  <div class="brand"><img src="../images/ViewNam logo.png" alt=""><span class="url">www.viewnam.com</span></div>
</body>
</html>
