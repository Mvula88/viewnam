<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
<title>FB 06 — 150+ Checks</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green-deep:#062A1F;--gold:#D4A843;--cream:#F5EFDE}
  body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:var(--green-deep);color:var(--cream);position:relative}
  body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.04) 1px,transparent 1px);background-size:28px 28px;opacity:0.6;pointer-events:none}
  .ghost{position:absolute;top:-40px;right:-40px;font-family:'Playfair Display',serif;font-weight:900;font-style:italic;font-size:640px;line-height:0.82;color:rgba(212,168,67,0.06);letter-spacing:-22px;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:2;padding:90px 100px;height:100%;display:flex;flex-direction:column}
  .masthead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:120px}
  .idx{font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--gold);letter-spacing:0.5px}
  .idx b{font-weight:700;font-style:normal;letter-spacing:2.5px}
  .cat{font-size:11px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);opacity:0.9}
  .hero{flex:1;display:flex;flex-direction:column;justify-content:center}
  .n{font-family:'Playfair Display',serif;font-weight:800;font-size:360px;line-height:0.85;letter-spacing:-14px;color:#fff;margin-bottom:8px}
  .n .plus{color:var(--gold);font-style:italic;font-weight:700}
  h1{font-family:'Playfair Display',serif;font-weight:700;font-style:italic;font-size:64px;line-height:1;letter-spacing:-1.6px;color:var(--cream);margin-left:8px}
  .lede{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;line-height:1.4;color:rgba(245,239,222,0.7);max-width:640px;margin-top:38px;margin-left:10px}
  .sep{width:60px;height:2px;background:var(--gold);margin:30px 0 0 10px}
  .footer{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(212,168,67,0.2);padding-top:22px;margin-top:auto}
  .mark{background:#fff;padding:10px 18px;border-radius:10px;display:inline-flex;align-items:center}
  .mark img{height:56px;display:block}
  .url{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(245,239,222,0.55)}
</style>
</head>
<body>
  <div class="ghost">150</div>
  <div class="wrap">
    <div class="masthead">
      <div>
        <div class="cat">The Inspection</div>
        <div style="height:10px"></div>
        <div class="idx"><b>N° 06</b> &nbsp;·&nbsp; <i>A ViewNam feature</i></div>
      </div>
      <div class="idx" style="text-align:right;opacity:0.55;max-width:240px"><i>Deliberate, not<br>performative.</i></div>
    </div>
    <div class="hero">
      <div class="n">150<span class="plus">+</span></div>
      <h1>checks. Every visit.</h1>
      <div class="sep"></div>
      <div class="lede">One inspection. One honest report. Nothing skipped.</div>
    </div>
    <div class="footer">
      <div class="mark"><img src="../images/ViewNam logo.png" alt="ViewNam"></div>
      <div class="url">www.viewnam.com</div>
    </div>
  </div>
</body>
</html>
