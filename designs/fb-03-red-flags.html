<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
<title>FB 03 — Red Flags</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green-deep:#062A1F;--gold:#D4A843;--cream:#F5EFDE}
  body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:var(--green-deep);color:var(--cream);position:relative}
  body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.04) 1px,transparent 1px);background-size:28px 28px;opacity:0.6;pointer-events:none}
  .ghost{position:absolute;top:-40px;right:-40px;font-family:'Playfair Display',serif;font-weight:900;font-style:italic;font-size:400px;line-height:0.82;color:rgba(212,168,67,0.05);letter-spacing:-12px;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:2;padding:90px 100px;height:100%;display:flex;flex-direction:column}
  .masthead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:50px}
  .cat{font-size:11px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);opacity:0.9}
  .idx{font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--gold);letter-spacing:0.5px}
  h1{font-family:'Playfair Display',serif;font-weight:800;font-size:82px;line-height:0.98;letter-spacing:-2.2px;color:#fff;margin-bottom:12px}
  h1 .it{font-style:italic;font-weight:700;color:var(--gold)}
  .sep{width:60px;height:2px;background:var(--gold);margin:24px 0 36px}
  .list{flex:1;display:flex;flex-direction:column;justify-content:center;gap:0;border-top:1px solid rgba(212,168,67,0.18)}
  .row{display:grid;grid-template-columns:64px 1fr;gap:24px;align-items:baseline;padding:22px 0;border-bottom:1px solid rgba(212,168,67,0.18)}
  .row .n{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:30px;color:var(--gold);letter-spacing:-0.5px}
  .row h3{font-family:'Playfair Display',serif;font-weight:700;font-size:28px;letter-spacing:-0.4px;color:#fff;line-height:1.2}
  .row h3 .lite{color:rgba(245,239,222,0.55);font-style:italic;font-weight:400;font-size:20px;margin-left:8px}
  .footer{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(212,168,67,0.2);padding-top:22px;margin-top:40px}
  .mark{background:#fff;padding:10px 18px;border-radius:10px;display:inline-flex;align-items:center}
  .mark img{height:56px;display:block}
  .url{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(245,239,222,0.55)}
</style>
</head>
<body>
  <div class="ghost">Signs.</div>
  <div class="wrap">
    <div class="masthead">
      <div><div class="cat">Red Flags</div></div>
      <div class="idx" style="text-align:right;opacity:0.55;max-width:240px"><i>What the polish is<br>trying to cover.</i></div>
    </div>
    <h1>Five things a seller<br><span class="it">hopes you'll miss.</span></h1>
    <div class="sep"></div>
    <div class="list">
      <div class="row"><div class="n">i.</div><h3>Fresh polish over old damage</h3></div>
      <div class="row"><div class="n">ii.</div><h3>"The aircon just needs gas"</h3></div>
      <div class="row"><div class="n">iii.</div><h3>No service book</h3></div>
      <div class="row"><div class="n">iv.</div><h3>VIN that doesn't match the papers</h3></div>
      <div class="row"><div class="n">v.</div><h3>"Another buyer is coming now"</h3></div>
    </div>
    <div class="footer">
      <div class="mark"><img src="../images/ViewNam logo.png" alt="ViewNam"></div>
      <div class="url">www.viewnam.com</div>
    </div>
  </div>
</body>
</html>
