<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>FB 07 — Buyer First</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:#0B3D2E;color:#fff;position:relative;display:flex;flex-direction:column;justify-content:center;padding:100px 90px}
  body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.06) 1.5px,transparent 1.5px);background-size:32px 32px;pointer-events:none}
  body::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(212,168,67,0.18) 0%,transparent 60%),radial-gradient(circle at 80% 80%,rgba(212,168,67,0.12) 0%,transparent 50%);pointer-events:none}
  .quote{position:absolute;top:80px;left:90px;font-size:160px;line-height:1;color:rgba(212,168,67,0.18);font-weight:900;font-family:serif;z-index:1}
  .k{position:relative;z-index:2;font-size:17px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#D4A843;margin-bottom:30px}
  h1{position:relative;z-index:2;font-size:120px;font-weight:900;line-height:0.92;letter-spacing:-4px;margin-bottom:36px}
  h1 .small{font-size:62px;font-weight:800;color:rgba(255,255,255,0.65);letter-spacing:-1.5px;display:block;margin-bottom:-8px}
  h1 .big{color:#D4A843}
  .rule{position:relative;z-index:2;width:120px;height:4px;background:#D4A843;margin-bottom:36px;border-radius:2px}
  .sub{position:relative;z-index:2;font-size:32px;font-weight:600;line-height:1.3;max-width:820px;color:rgba(255,255,255,0.85);margin-bottom:20px;letter-spacing:-0.5px}
  .p{position:relative;z-index:2;font-size:22px;font-weight:500;color:rgba(255,255,255,0.65);line-height:1.5;max-width:780px;margin-bottom:50px}
  .brand{position:relative;z-index:2;display:flex;align-items:center;gap:16px}
  .brand img{height:44px;background:#fff;padding:8px 14px;border-radius:8px}
  .brand .url{font-size:18px;font-weight:700;color:#D4A843;letter-spacing:0.8px}
</style>
</head>
<body>
  <div class="quote">"</div>
  <div class="k">Who We Work For</div>
  <h1><span class="small">We work for</span><span class="big">the buyer.</span></h1>
  <div class="rule"></div>
  <div class="sub">The seller didn't hire us. You did.</div>
  <div class="p">That's why we tell you the truth about the car — even when it means telling you to walk away. No kickbacks. No hidden deals. Just one inspector, one honest report, one side to work for: <strong style="color:#fff">yours.</strong></div>
  <div class="brand"><img src="../images/ViewNam logo.png" alt=""><span class="url">www.viewnam.com</span></div>
</body>
</html>
