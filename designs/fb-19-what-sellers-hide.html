<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
<title>FB 19 — The Fee Below The Price</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green-deep:#062A1F;--gold:#D4A843;--cream:#F5EFDE}
  body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:var(--green-deep);color:var(--cream);position:relative}
  body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.04) 1px,transparent 1px);background-size:28px 28px;opacity:0.6;pointer-events:none}
  .ghost{position:absolute;bottom:-60px;right:-50px;font-family:'Playfair Display',serif;font-weight:900;font-style:italic;font-size:420px;line-height:0.8;color:rgba(212,168,67,0.06);letter-spacing:-14px;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:2;padding:90px 100px;height:100%;display:flex;flex-direction:column}
  .masthead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:70px}
  .idx{font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--gold);letter-spacing:0.5px}
  .idx b{font-weight:700;font-style:normal;letter-spacing:2.5px}
  .cat{font-size:11px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);opacity:0.9}
  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:900px}
  h1{font-family:'Playfair Display',serif;font-weight:800;font-size:112px;line-height:0.94;letter-spacing:-3px;color:#fff;margin-bottom:20px}
  h1 .it{font-style:italic;font-weight:700;color:var(--gold)}
  .sep{width:60px;height:2px;background:var(--gold);margin:28px 0 32px}
  .lede{font-family:'Playfair Display',serif;font-style:italic;font-size:26px;line-height:1.45;color:rgba(245,239,222,0.78);max-width:780px}
  .lede em{font-style:normal;font-weight:700;color:var(--gold)}
  .footer{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(212,168,67,0.2);padding-top:22px;margin-top:auto}
  .mark{background:#fff;padding:10px 18px;border-radius:10px;display:inline-flex;align-items:center}
  .mark img{height:56px;display:block}
  .url{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(245,239,222,0.55)}
</style>
</head>
<body>
  <div class="ghost">Hidden.</div>
  <div class="wrap">
    <div class="masthead">
      <div>
        <div class="cat">The Unmentioned</div>
        <div style="height:10px"></div>
        <div class="idx"><b>N° 19</b> &nbsp;·&nbsp; <i>Buyer's Dossier</i></div>
      </div>
      <div class="idx" style="text-align:right;opacity:0.55;max-width:260px"><i>"Everything's fine —<br>it just needs a service."</i></div>
    </div>
    <div class="hero">
      <h1>The fee below<br>the asking <span class="it">price.</span></h1>
      <div class="sep"></div>
      <div class="lede">Every used car hides a second invoice. <em>We read it</em> before you sign the first.</div>
    </div>
    <div class="footer">
      <div class="mark"><img src="../images/ViewNam logo.png" alt="ViewNam"></div>
      <div class="url">www.viewnam.com</div>
    </div>
  </div>
</body>
</html>
