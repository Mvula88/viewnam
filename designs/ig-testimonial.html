<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>ViewNam — Testimonial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #0B3D2E;
    color: #FFFFFF;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(212,168,67,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 88px;
    text-align: center;
  }
  .quote-mark {
    font-size: 180px;
    font-weight: 900;
    color: #D4A843;
    line-height: 0.6;
    margin-bottom: 16px;
    font-family: Georgia, serif;
  }
  .quote {
    font-size: 38px;
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: -0.8px;
    max-width: 820px;
    margin-bottom: 48px;
  }
  .quote em {
    color: #D4A843;
    font-style: normal;
  }
  .author {
    font-size: 24px;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }
  .stars {
    display: flex;
    gap: 8px;
    margin-bottom: 64px;
  }
  .stars svg {
    width: 36px;
    height: 36px;
  }
  .bottom {
    position: absolute;
    bottom: 56px;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .bottom .logo {
    height: 40px;
    filter: brightness(0) invert(1);
  }
  .bottom .url {
    font-size: 20px;
    font-weight: 600;
    color: #D4A843;
    letter-spacing: 1px;
  }
  .side-line {
    position: absolute;
    left: 56px;
    top: 120px;
    bottom: 120px;
    width: 4px;
    background: linear-gradient(to bottom, transparent, #D4A843, transparent);
    border-radius: 2px;
  }
  .side-line-right {
    left: auto;
    right: 56px;
  }
</style>
</head>
<body>
  <div class="side-line"></div>
  <div class="side-line side-line-right"></div>
  <div class="container">
    <div class="quote-mark">"</div>
    <p class="quote">ViewNam's inspector found <em>serious engine damage</em> the seller didn't mention. They saved me <em>N$45,000</em>.</p>
    <p class="author">— Johannes M., Oshakati</p>
    <div class="stars">
      <svg viewBox="0 0 24 24" fill="#D4A843"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg viewBox="0 0 24 24" fill="#D4A843"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg viewBox="0 0 24 24" fill="#D4A843"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg viewBox="0 0 24 24" fill="#D4A843"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg viewBox="0 0 24 24" fill="#D4A843"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <div class="bottom">
      <img class="logo" src="../images/ViewNam logo.png" alt="ViewNam">
      <span class="url">www.viewnam.com</span>
    </div>
  </div>
</body>
</html>
