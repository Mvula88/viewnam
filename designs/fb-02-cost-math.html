<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>FB 02 — Cost Math</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:#0B3D2E;color:#fff;position:relative;display:flex;flex-direction:column}
  body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.06) 1.5px,transparent 1.5px);background-size:32px 32px;pointer-events:none}
  .title{padding:80px 80px 40px;position:relative;z-index:1}
  .title .k{font-size:16px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#D4A843;margin-bottom:18px}
  .title h1{font-size:58px;font-weight:900;line-height:1.05;letter-spacing:-1.5px}
  .title h1 .a{color:#D4A843}
  .split{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:0;position:relative;z-index:1;padding:0 60px}
  .box{padding:44px 30px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
  .box .label{font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
  .box .amt{font-weight:900;line-height:0.95;letter-spacing:-3px;margin-bottom:18px}


  <div class="vs">VS</div>
    <div class="box big">
      <div class="label">Next Month</div>
      <div class="amt">N$50,000+</div>
      <div class="desc">Hidden repairs you only discover after you paid.</div>
    </div>
  </div>
  <div class="footer">
    <div class="cta">Pay for the inspection. <span class="a">Not the regret.</span></div>
    <div class="brand"><img src="../images/ViewNam logo.png" alt=""><span class="url">www.viewnam.com</span></div>
  </div>
</body>
</html>
