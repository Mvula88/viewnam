<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>FB 02 — Cost Math</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:#0B3D2E;color:#fff;position:relative;display:flex;flex-direction:column}
  body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.06) 1.5px,transparent 1.5px);background-size:32px 32px;pointer-events:none}
  .title{padding:80px 80px 40px;position:relative;z-index:1}
  .title .k{font-size:16px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#D4A843;margin-bottom:18px}
  .title h1{font-size:58px;font-weight:900;line-height:1.05;letter-spacing:-1.5px}
  .title h1 .a{color:#D4A843}
  .split{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:0;position:relative;z-index:1;padding:0 60px}
  .box{padding:50px 40px;display:flex;flex-direction:column;justify-content:center}
  .box .label{font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
  .box .amt{font-size:128px;font-weight:900;line-height:0.95;letter-spacing:-4px;margin-bottom:18px}
  .box .desc{font-size:22px;font-weight:500;line-height:1.35}
  .box.small{background:rgba(255,255,255,0.04);border:1.5px solid rgba(212,168,67,0.25);border-radius:20px;margin-right:-1px;margin:0 16px 0 0}
  .box.small .label{color:#D4A843}
  .box.small .amt{color:#fff}
  .box.small .desc{color:rgba(255,255,255,0.7)}
  .box.big{background:rgba(192,57,43,0.12);border:1.5px solid rgba(192,57,43,0.45);border-radius:20px;margin:0 0 0 16px}
  .box.big .label{color:#E06654}
  .box.big .amt{color:#E06654}
  .box.big .desc{color:rgba(255,255,255,0.85)}
  .vs{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;width:72px;height:72px;background:#D4A843;color:#0B3D2E;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;letter-spacing:0.5px;box-shadow:0 8px 24px rgba(0,0,0,0.35)}
  .footer{padding:50px 80px 70px;position:relative;z-index:1}
  .cta{font-size:30px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px}
  .cta .a{color:#D4A843}
  .brand{display:flex;align-items:center;gap:14px;margin-top:26px}
  .brand img{height:40px;background:#fff;padding:7px 12px;border-radius:7px}
  .brand .url{font-size:17px;font-weight:700;color:#D4A843;letter-spacing:0.8px}
</style>
</head>
<body>
  <div class="title">
    <div class="k">The Real Math</div>
    <h1>One small decision.<br><span class="a">Two very different bills.</span></h1>
  </div>
  <div class="split" style="position:relative">
    <div class="box small">
      <div class="label">Today</div>
      <div class="amt">N$950</div>
      <div class="desc">One ViewNam inspection. Done in a day.</div>
    </div>
    <div class="vs">VS</div>
    <div class="box big">
      <div class="label">Next Month</div>
      <div class="amt">N$50,000+</div>
      <div class="desc">Hidden repairs you only discover after you paid.</div>
    </div>
  </div>
  <div class="footer">
    <div class="cta">Pay for the inspection. <span class="a">Not the regret.</span></div>
    <div class="brand"><img src="../images/ViewNam logo.png" alt=""><span class="url">www.viewnam.com · +264 81 321 4813</span></div>
  </div>
</body>
</html>
