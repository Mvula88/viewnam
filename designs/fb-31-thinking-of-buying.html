<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
<title>FB 31 — Thinking Of Buying</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green-deep:#062A1F;--gold:#D4A843;--cream:#F5EFDE}
  body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:var(--green-deep);color:var(--cream);position:relative}

  /* Hero photo on the right. All edges dissolve into the dark-green
     background via layered gradient overlays — left scrim for the
     text boundary, top/bottom scrims so the picture emerges from
     the green rather than sitting in a rectangle. */
  .photo{position:absolute;top:0;right:0;width:54%;height:100%;z-index:1;overflow:hidden}
  .photo img{width:100%;height:100%;object-fit:cover;object-position:40% center;display:block;filter:contrast(1.04) saturate(0.92)}
  /* Layered gradient overlays — each handles one edge of the photo */
  .photo .vignette{position:absolute;inset:0;z-index:2;pointer-events:none;
    background:
      linear-gradient(90deg, rgba(6,42,31,1) 0%, rgba(6,42,31,0.7) 22%, rgba(6,42,31,0) 55%),
      linear-gradient(180deg, rgba(6,42,31,1) 0%, rgba(6,42,31,0.5) 10%, rgba(6,42,31,0) 25%),
      linear-gradient(0deg, rgba(6,42,31,1) 0%, rgba(6,42,31,0.5) 10%, rgba(6,42,31,0) 28%),
      linear-gradient(270deg, rgba(6,42,31,0.7) 0%, rgba(6,42,31,0.15) 20%, rgba(6,42,31,0) 50%)}
  /* Subtle green tint for palette cohesion */
  .photo::after{content:'';position:absolute;inset:0;background:rgba(6,42,31,0.18);mix-blend-mode:multiply;z-index:1;pointer-events:none}

  /* Dot grain stays on top of everything for consistent brand texture */
  .grain{position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.04) 1px,transparent 1px);background-size:28px 28px;opacity:0.6;pointer-events:none;z-index:3}

  .ghost{position:absolute;top:-60px;left:-40px;font-family:'Playfair Display',serif;font-weight:900;font-style:italic;font-size:420px;line-height:0.82;color:rgba(212,168,67,0.05);letter-spacing:-14px;pointer-events:none;z-index:2}

  .wrap{position:relative;z-index:4;padding:90px 100px;height:100%;display:flex;flex-direction:column}

  .masthead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:60px}
  .cat{font-size:11px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);opacity:0.9}
  .idx{font-family:'Playfair Display',serif;font-style:italic;font-size:16px;color:var(--gold);letter-spacing:0.5px}

  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:620px}
  h1{font-family:'Playfair Display',serif;font-weight:800;font-size:114px;line-height:0.92;letter-spacing:-3.2px;color:#fff;margin-bottom:10px}
  h1 .it{font-style:italic;font-weight:700;color:var(--gold)}
  .sub{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:38px;color:var(--gold);margin-bottom:32px;letter-spacing:-0.5px}
  .sep{width:60px;height:2px;background:var(--gold);margin-bottom:32px}
  .lede{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;line-height:1.5;color:rgba(245,239,222,0.85);margin-bottom:30px;max-width:540px}
  .lede em{font-style:normal;font-weight:700;color:var(--gold)}
  .promise{font-family:'Playfair Display',serif;font-weight:700;font-size:26px;color:#fff;line-height:1.3;letter-spacing:-0.4px;margin-bottom:6px;max-width:540px}
  .promise em{font-style:italic;color:var(--gold);font-weight:700}
  .warn{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:28px;color:var(--gold)}

  .footer{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(212,168,67,0.2);padding-top:22px;margin-top:auto}
  .mark{background:#fff;padding:10px 18px;border-radius:10px;display:inline-flex;align-items:center}
  .mark img{height:56px;display:block}
  .url{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(245,239,222,0.55)}
</style>
</head>
<body>
  <div class="photo">
    <img src="../images/thinking.jpg" alt="">
    <div class="vignette"></div>
  </div>
  <div class="grain"></div>
  <div class="ghost">Buying?</div>

  <div class="wrap">
    <div class="masthead">
      <div><div class="cat">Before You Decide</div></div>
      <div class="idx" style="text-align:right;opacity:0.55;max-width:240px"><i>Read this before you<br>start scrolling listings.</i></div>
    </div>

    <div class="hero">
      <h1>Thinking of<br>buying <span class="it">a car?</span></h1>
      <div class="sub">Avoid costly mistakes.</div>
      <div class="sep"></div>
      <div class="lede">Good. You're already ahead of most buyers — because you're reading this <em>before</em> you've paid.</div>
      <div class="promise">One inspection can save you <em>thousands.</em></div>
      <div class="warn">Don't risk it.</div>
    </div>

    <div class="footer">
      <div class="mark"><img src="../images/ViewNam logo.png" alt="ViewNam"></div>
      <div class="url">www.viewnam.com</div>
    </div>
  </div>
</body>
</html>
