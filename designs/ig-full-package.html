<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>ViewNam — Full Package</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #0B3D2E;
    color: #FFFFFF;
    position: relative;
  }
  /* Subtle texture overlay */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 80% 20%, rgba(212,168,67,0.06) 0%, transparent 50%),
                radial-gradient(circle at 10% 90%, rgba(212,168,67,0.04) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 64px 72px;
  }
  .logo {
    width: 180px;
    margin-bottom: 24px;
  }
  .logo img {
    width: 100%;
    filter: brightness(0) invert(1);
  }
  .gold-bar {
    width: 72px;
    height: 5px;
    background: #D4A843;
    border-radius: 3px;
    margin-bottom: 48px;
  }
  .headline {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -2px;
    max-width: 820px;
    margin-bottom: 20px;
  }
  .subline {
    font-size: 32px;
    font-weight: 600;
    color: #D4A843;
    margin-bottom: 64px;
    letter-spacing: -0.5px;
  }
  .checklist {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: auto;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .check-icon {
    width: 44px;
    height: 44px;
    background: #D4A843;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .check-icon svg {
    width: 22px;
    height: 22px;
  }
  .bottom {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cta {
    font-size: 24px;
    font-weight: 700;
    color: #D4A843;
    letter-spacing: 1px;
  }
  .price-badge {
    background: #D4A843;
    color: #0B3D2E;
    padding: 16px 36px;
    border-radius: 12px;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="../images/ViewNam logo.png" alt="ViewNam"></div>
    <div class="gold-bar"></div>
    <h1 class="headline">Get Your Car Checked Before You Pay</h1>
    <p class="subline">Full inspection from N$1,800</p>
    <div class="checklist">
      <div class="check-item">
        <div class="check-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0B3D2E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>40+ real photos of your car</span>
      </div>
      <div class="check-item">
        <div class="check-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0B3D2E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Full engine & diagnostics check</span>
      </div>
      <div class="check-item">
        <div class="check-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0B3D2E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Buy / Don't Buy verdict</span>
      </div>
    </div>
    <div class="bottom">
      <span class="cta">viewnam.vercel.app</span>
      <div class="price-badge">N$1,800</div>
    </div>
  </div>
</body>
</html>
