<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>FB 20 — First Car</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:#0B3D2E;color:#fff;position:relative;padding:90px 80px;display:flex;flex-direction:column;justify-content:center}
  body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.06) 1.5px,transparent 1.5px);background-size:32px 32px;pointer-events:none}
  body::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(212,168,67,0.16) 0%,transparent 55%);pointer-events:none}
  .k{position:relative;z-index:1;font-size:17px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#D4A843;margin-bottom:26px}
  h1{position:relative;z-index:1;font-size:96px;font-weight:900;line-height:0.94;letter-spacing:-3.5px;margin-bottom:32px}
  h1 .a{color:#D4A843}
  .p{position:relative;z-index:1;font-size:26px;font-weight:500;line-height:1.5;color:rgba(255,255,255,0.82);max-width:860px;margin-bottom:20px}
  .p strong{color:#fff;font-weight:700}
  .highlight{position:relative;z-index:1;background:rgba(212,168,67,0.12);border-left:4px solid #D4A843;padding:24px 28px;border-radius:12px;margin:32px 0;max-width:860px}
  .highlight .q{font-size:26px;font-weight:800;line-height:1.35;letter-spacing:-0.4px;color:#fff}
  .highlight .q .a{color:#D4A843}
  .tag{position:relative;z-index:1;font-size:32px;font-weight:900;color:#fff;letter-spacing:-0.8px;line-height:1.2;margin-bottom:46px;max-width:860px}
  .tag .a{color:#D4A843}
  .brand{position:relative;z-index:1;display:flex;align-items:center;gap:14px}
  .brand img{height:42px;background:#fff;padding:7px 13px;border-radius:8px}
  .brand .url{font-size:18px;font-weight:700;color:#D4A843;letter-spacing:0.8px}
</style>
</head>
<body>
  <div class="k">First-Time Buyer?</div>
  <h1>Your first car<br>shouldn't be<br>your <span class="a">first regret.</span></h1>
  <div class="p">Excitement rushes the decision. The seller smiles. You pay. A month later you learn what you didn't know to ask.</div>
  <div class="highlight">
    <div class="q">We step in <span class="a">between the excitement and the signature.</span></div>
  </div>
  <div class="tag">Start strong. <span class="a">Buy smart.</span></div>
  <div class="brand"><img src="../images/ViewNam logo.png" alt=""><span class="url">www.viewnam.com</span></div>
</body>
</html>
