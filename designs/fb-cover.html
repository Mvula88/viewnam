<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>ViewNam — Facebook Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 820px;
    height: 312px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #0B3D2E;
    color: #FFFFFF;
    position: relative;
  }
  /* Subtle dot pattern */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(rgba(212,168,67,0.07) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 75% 50%, rgba(212,168,67,0.1) 0%, transparent 50%);
    pointer-events: none;
  }
  .main {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 56px;
    padding-bottom: 40px;
  }
  .left {
    flex: 1;
  }
  .headline {
    font-size: 36px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -1.5px;
  }
  .headline span {
    color: #D4A843;
  }
  .tagline {
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    margin-top: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .right {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 40px;
  }
  .logo {
    width: 180px;
    filter: brightness(0) invert(1);
  }
  .bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: #D4A843;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    z-index: 2;
  }
  .bottom-strip span {
    font-size: 14px;
    font-weight: 700;
    color: #0B3D2E;
    letter-spacing: 0.5px;
  }
  .bottom-strip .dot {
    width: 5px;
    height: 5px;
    background: #0B3D2E;
    border-radius: 50%;
    opacity: 0.4;
  }
</style>
</head>
<body>
  <div class="main">
    <div class="left">
      <h1 class="headline">We Inspect Cars<br>For You. <span>Anywhere<br>In Namibia.</span></h1>
      <p class="tagline">Professional car inspections</p>
    </div>
    <div class="right">
      <img class="logo" src="../images/ViewNam logo.png" alt="ViewNam">
    </div>
  </div>
  <div class="bottom-strip">
    <span>viewnam.vercel.app</span>
    <div class="dot"></div>
    <span>+264 81 321 4813</span>
  </div>
</body>
</html>
