<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
<title>ViewNam — Cover</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green-deep:#062A1F;--gold:#D4A843;--cream:#F5EFDE}
  body{width:820px;height:312px;overflow:hidden;font-family:'Inter',sans-serif;background:var(--green-deep);color:var(--cream);position:relative}
  body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.05) 1px,transparent 1px);background-size:24px 24px;opacity:0.55;pointer-events:none}
  .ghost{position:absolute;bottom:-60px;left:-30px;font-family:'Playfair Display',serif;font-weight:900;font-style:italic;font-size:240px;line-height:0.82;color:rgba(212,168,67,0.05);letter-spacing:-8px;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:2;padding:36px 42px;height:100%;display:flex;align-items:center;gap:30px}
  .left{flex:1.3}
  .cat{font-size:10px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);opacity:0.9;margin-bottom:10px}
  h1{font-family:'Playfair Display',serif;font-weight:800;font-size:52px;line-height:0.98;letter-spacing:-1.7px;color:#fff;margin-bottom:8px}
  h1 .it{font-style:italic;font-weight:700;color:var(--gold)}
  .sep{width:42px;height:2px;background:var(--gold);margin:14px 0}
  .lede{font-family:'Playfair Display',serif;font-style:italic;font-size:16px;line-height:1.4;color:rgba(245,239,222,0.78);max-width:440px}
  .right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .tile{background:#fff;padding:10px 16px;border-radius:10px;display:inline-flex;align-items:center}
  .tile img{height:52px;display:block}
  .url{font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(245,239,222,0.6)}
</style>
</head>
<body>
  <div class="ghost">Namibia.</div>
  <div class="wrap">
    <div class="left">
      <div class="cat">Vehicle Inspections · Namibia</div>
      <h1>Know the car.<br><span class="it">Before you pay.</span></h1>
      <div class="sep"></div>
      <div class="lede">Independent, nationwide, honest. ViewNam works for the buyer.</div>
    </div>
    <div class="right">
      <div class="tile"><img src="../images/ViewNam logo.png" alt="ViewNam"></div>
      <div class="url">www.viewnam.com</div>
    </div>
  </div>
</body>
</html>
