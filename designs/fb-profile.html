<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>ViewNam — Facebook Profile Photo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #FFFFFF;
    color: #0B3D2E;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Very subtle tinted background so the white doesn't feel bare on FB feed */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 45%, #F4F8F6 0%, #FFFFFF 65%);
  }

  /* Safe zone — Facebook crops a circle inscribed in the square.
     Everything critical must stay inside a ~880px circle centred. */
  .safe {
    position: relative;
    z-index: 2;
    width: 880px;
    height: 880px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }

  .logo {
    width: 640px;
    height: auto;
    display: block;
  }

  .divider {
    width: 120px;
    height: 3px;
    background: #D4A843;
    border-radius: 2px;
    margin: 36px 0 28px;
  }

  .tagline {
    font-size: 40px;
    font-weight: 800;
    color: #0B3D2E;
    letter-spacing: -0.5px;
    line-height: 1.15;
    max-width: 700px;
  }

  .tagline .accent {
    color: #D4A843;
  }
</style>
</head>
<body>
  <div class="safe">
    <img class="logo" src="../images/ViewNam logo.png" alt="ViewNam">
    <div class="divider"></div>
    <div class="tagline">We Check Cars<br><span class="accent">Before You Buy</span></div>
  </div>
</body>
</html>
