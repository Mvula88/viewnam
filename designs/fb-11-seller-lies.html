<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
<title>FB 11 — Lies You've Heard</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green-deep:#062A1F;--gold:#D4A843;--cream:#F5EFDE}
  body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:var(--green-deep);color:var(--cream);position:relative}
  body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(212,168,67,0.04) 1px,transparent 1px);background-size:28px 28px;opacity:0.6;pointer-events:none}
  .ghost{position:absolute;top:-60px;right:-50px;font-family:'Playfair Display',serif;font-weight:900;font-style:italic;font-size:480px;line-height:0.82;color:rgba(212,168,67,0.05);letter-spacing:-14px;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:2;padding:90px 100px;height:100%;display:flex;flex-direction:column}
  .masthead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:50px}
  .cat{font-size:11px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);opacity:0.9}
  .idx{font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--gold);letter-spacing:0.5px}
  h1{font-family:'Playfair Display',serif;font-weight:800;font-size:82px;line-height:0.98;letter-spacing:-2.2px;color:#fff;margin-bottom:14px}
  h1 .it{font-style:italic;font-weight:700;color:var(--gold)}
  .sep{width:60px;height:2px;background:var(--gold);margin:26px 0 36px}
  .quotes{flex:1;display:flex;flex-direction:column;justify-content:center;gap:22px}
  .q{font-family:'Playfair Display',serif;font-style:italic;font-size:32px;line-height:1.35;color:rgba(245,239,222,0.92);letter-spacing:-0.4px;padding-left:26px;border-left:2px solid var(--gold);max-width:860px}
  .q::before{content:'"';color:var(--gold);font-size:42px;font-weight:900;margin-right:6px;line-height:0}
  .q::after{content:'"';color:var(--gold);font-size:42px;font-weight:900;margin-left:3px;line-height:0}
  .footer{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(212,168,67,0.2);padding-top:22px;margin-top:40px}
  .mark{background:#fff;padding:10px 18px;border-radius:10px;display:inline-flex;align-items:center}
  .mark img{height:56px;display:block}
  .url{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(245,239,222,0.55)}
</style>
</head>
<body>
  <div class="ghost">Said.</div>
  <div class="wrap">
    <div class="masthead">
      <div><div class="cat">Things Sellers Say</div></div>
      <div class="idx" style="text-align:right;opacity:0.55;max-width:240px"><i>Four sentences to<br>never take at face value.</i></div>
    </div>
    <h1>Four sentences<br>worth <span class="it">verifying.</span></h1>
    <div class="sep"></div>
    <div class="quotes">
      <div class="q">One owner, very well taken care of.</div>
      <div class="q">Never been in an accident.</div>
      <div class="q">The aircon just needs a little gas.</div>
      <div class="q">Papers are at home, I'll bring them later.</div>
    </div>
    <div class="footer">
      <div class="mark"><img src="../images/ViewNam logo.png" alt="ViewNam"></div>
      <div class="url">www.viewnam.com</div>
    </div>
  </div>
</body>
</html>
